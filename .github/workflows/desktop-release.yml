name: Desktop Release
on:
  push:
    tags: ['desktop-v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build sidecar (Unix)
        if: runner.os != 'Windows'
        run: |
          cd desktop && chmod +x scripts/build-sidecar.sh && ./scripts/build-sidecar.sh

      - name: Build sidecar (Windows)
        if: runner.os == 'Windows'
        run: |
          cd desktop
          pwsh scripts/build-sidecar-win.ps1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: |
          cd desktop && npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'NeuralClaw Desktop ${{ github.ref_name }}'
          releaseBody: 'See the assets for download links and the latest.json for auto-update.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  # After all platform builds complete, ensure latest.json exists
  updater-json:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check if latest.json exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # Check if latest.json is already in the release
          EXISTS=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets -q '.assets[].name' | grep -c "latest.json" || true)
          echo "exists=$EXISTS" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.check.outputs.exists == '0'

      - name: Generate and upload latest.json
        if: steps.check.outputs.exists == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          VERSION="${TAG#desktop-v}"

          echo "Generating latest.json for version $VERSION"

          # Get all .sig files from the release to find updater assets
          ASSETS_JSON=$(gh release view "$TAG" --repo "$REPO" --json assets -q '.assets')

          # Build platform entries
          # Look for the .tar.gz.sig (macOS), .msi.sig or .nsis.sig (Windows), .AppImage.sig (Linux)
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          # Helper: find asset URL by pattern
          find_asset() {
            echo "$ASSETS_JSON" | python3 -c "
          import json, sys, re
          assets = json.load(sys.stdin)
          pattern = sys.argv[1]
          for a in assets:
              if re.search(pattern, a['name']):
                  print(a['name'])
                  break
          " "$1" 2>/dev/null || true
          }

          # Find signature content
          get_sig() {
            local sig_name="$1"
            if [ -n "$sig_name" ]; then
              gh release download "$TAG" --repo "$REPO" --pattern "$sig_name" --dir /tmp/sigs 2>/dev/null
              if [ -f "/tmp/sigs/$sig_name" ]; then
                cat "/tmp/sigs/$sig_name"
              fi
            fi
          }

          mkdir -p /tmp/sigs

          # Find platform assets
          MAC_TAR=$(find_asset '\.app\.tar\.gz$')
          MAC_SIG=$(find_asset '\.app\.tar\.gz\.sig$')
          WIN_MSI=$(find_asset '\.msi\.zip$')
          WIN_MSI_SIG=$(find_asset '\.msi\.zip\.sig$')
          WIN_NSIS=$(find_asset 'setup\.exe$')
          WIN_NSIS_SIG=$(find_asset 'setup\.exe\.sig$')
          LINUX_APPIMAGE=$(find_asset '\.AppImage\.tar\.gz$')
          LINUX_APPIMAGE_SIG=$(find_asset '\.AppImage\.tar\.gz\.sig$')
          LINUX_DEB=$(find_asset '\.deb$')

          # If no .tar.gz wrapped versions, try direct names
          if [ -z "$WIN_MSI" ]; then
            WIN_MSI=$(find_asset '\.msi$')
            WIN_MSI_SIG=$(find_asset '\.msi\.sig$')
          fi
          if [ -z "$LINUX_APPIMAGE" ]; then
            LINUX_APPIMAGE=$(find_asset '\.AppImage$')
            LINUX_APPIMAGE_SIG=$(find_asset '\.AppImage\.sig$')
          fi

          # Get signatures
          MAC_SIG_CONTENT=$(get_sig "$MAC_SIG")
          WIN_MSI_SIG_CONTENT=$(get_sig "$WIN_MSI_SIG")
          WIN_NSIS_SIG_CONTENT=$(get_sig "$WIN_NSIS_SIG")
          LINUX_SIG_CONTENT=$(get_sig "$LINUX_APPIMAGE_SIG")

          # Build latest.json
          cat > /tmp/latest.json << ENDJSON
          {
            "version": "$VERSION",
            "notes": "NeuralClaw Desktop $TAG — role-based model router, pip_install skill, Ollama multi-model routing",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$MAC_SIG_CONTENT",
                "url": "$BASE_URL/$MAC_TAR"
              },
              "windows-x86_64": {
                "signature": "${WIN_NSIS_SIG_CONTENT:-$WIN_MSI_SIG_CONTENT}",
                "url": "$BASE_URL/${WIN_NSIS:-$WIN_MSI}"
              },
              "linux-x86_64": {
                "signature": "$LINUX_SIG_CONTENT",
                "url": "$BASE_URL/$LINUX_APPIMAGE"
              }
            }
          }
          ENDJSON

          echo "Generated latest.json:"
          cat /tmp/latest.json

          # Upload to release
          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber

          echo "Uploaded latest.json to release $TAG"
