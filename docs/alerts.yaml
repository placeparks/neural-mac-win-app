groups:
  - name: neuralclaw
    rules:
      - alert: ProviderCircuitOpen
        expr: neuralclaw_circuit_state > 0
        for: 30s
        annotations:
          summary: "Provider circuit breaker is open"

      - alert: HighMemoryUsage
        expr: neuralclaw_process_memory_rss_bytes > 500000000
        for: 5m
        annotations:
          summary: "NeuralClaw using more than 500MB RAM"

      - alert: SlowRequests
        expr: histogram_quantile(0.95, neuralclaw_request_duration_ms_bucket) > 5000
        for: 5m
        annotations:
          summary: "NeuralClaw p95 latency exceeds 5s"
