version: "3.9"

services:
  neuralclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuralclaw
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8100:8100"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - neuralclaw-data:/root/.neuralclaw
    command: ["neuralclaw", "gateway", "--watchdog"]

volumes:
  neuralclaw-data:
